on:
  push:
    branches: ["master"]

env:
  IMAGE_NAME: test-ci-cd

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set TAG from SHA
        run: echo "TAG=${GITHUB_SHA:0:8}" >> $GITHUB_ENV

      - name: Show TAG
        run: echo "TAG = ${{ env.TAG }}"

      # ⭐ Option 4 — Recommended Docker login
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}

      - name: Build Docker Image
        run: docker build -t ${{ secrets.USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.TAG }} .

      - name: Push Docker Image
        run: docker push ${{ secrets.USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.TAG }}

      - name: Logout
        if: always()
        run: docker logout
