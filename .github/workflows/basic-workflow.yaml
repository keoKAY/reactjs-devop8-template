on:
  push:
    branches: ["master"]

env:
  IMAGE_NAME: test-ci-cd

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set TAG from SHA
        run: echo "TAG=${GITHUB_SHA:0:8}" >> $GITHUB_ENV

      - name: Show the TAG value
        run: echo "TAG value is : ${{ env.TAG }}"

      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.PASSWORD }}" | docker login -u "${{ secrets.USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: docker build -t ${{ secrets.USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.TAG }} .

      - name: Push the Docker image
        run: docker push ${{ secrets.USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.TAG }}

      - name: Logout from Docker Hub
        if: always()
        run: docker logout
